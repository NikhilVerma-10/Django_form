<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            border-bottom: 3px solid #4CAF50;
            padding-bottom: 10px;
        }
        .post {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .post-title {
            color: #4CAF50;
            margin-top: 0;
            text-decoration: none;
        }
        .post-title:hover {
            color: #45a049;
            text-decoration: underline;
        }
        .post-content-preview {
            color: #555;
            line-height: 1.6;
            max-height: 100px;
            overflow: hidden;
            position: relative;
        }
        .read-more {
            color: #4CAF50;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
            display: inline-block;
        }
        .read-more:hover {
            text-decoration: underline;
        }
        .post-date {
            color: #888;
            font-size: 0.9em;
            font-style: italic;
        }
        .no-posts {
            text-align: center;
            color: #888;
            padding: 40px;
        }
        .create-btn {
            background-color: #4CAF50;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }
        .create-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>📝 My Blog Posts</h1>
    
    <a href="{% url 'post_create' %}" class="create-btn">+ Create New Post</a>
    
    {% if all_posts %}
        {% for post in all_posts %}
        <div class="post">
            <!-- Make title clickable with link to detail page -->
            <h2>
                <a href="{% url 'post_detail' post.pk %}" class="post-title">
                    {{ post.title }}
                </a>
            </h2>
            
            <!-- Show preview of content -->
            <div class="post-content-preview">
                {{ post.content|truncatewords:30 }}
            </div>
            
            <!-- Read More link -->
            <a href="{% url 'post_detail' post.pk %}" class="read-more">
                Read More →
            </a>
            
            <p class="post-date">Posted on: {{ post.created_at|date:"F d, Y - H:i" }}</p>
        </div>
        {% endfor %}
    {% else %}
        <div class="no-posts">
            <p>No posts yet. Create your first post!</p>
        </div>
    {% endif %}
</body>
</html>
